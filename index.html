<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mysemottakere Jæren</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>

        const map = L.map('map').setView([58.53, 5.74], 10);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

    const pigIcon = L.divIcon({
    html: '<div style="font-size:48px;text-shadow:-2px -2px 0 white,2px -2px 0 white,-2px 2px 0 white,2px 2px 0 white,0 0 8px rgba(0,0,0,0.6);">🐷</div>',
    className: "",
    iconSize: [48, 48]
});

const factoryIcon = L.divIcon({
    html: '<div style="font-size:52px;text-shadow:-2px -2px 0 white,2px -2px 0 white,-2px 2px 0 white,2px 2px 0 white,0 0 8px rgba(0,0,0,0.6);">🏭</div>',
    className: "",
    iconSize: [52, 52]
});

        fetch('customers.json')
            .then(response => response.json())
            .then(customers => {

                const markers = [];

                customers.forEach(customer => {

                    const icon =
                        customer.name === "TINE JÆREN"
                            ? factoryIcon
                            : pigIcon;

                    const marker = L.marker(
                        [customer.lat, customer.lng],
                        { icon: icon }
                    )
                    .addTo(map)
                    .bindPopup(customer.name);

                    markers.push([
                        customer.lat,
                        customer.lng
                    ]);

                });

                const bounds = L.latLngBounds(markers);

                map.fitBounds(bounds, {
                    padding: [50, 50]
                });

            });

    </script>

</body>
</html>
